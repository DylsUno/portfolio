<!DOCTYPE html>

<head>

<title>My Digital Portfolio</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f7;
}

/* Navigation */
header{
    background:black;
    padding:15px 40px;
}

nav{
    display:flex;
    justify-content:space-between;

nav ul{
    display:flex;
    gap:15px;

}

nav a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:black;
}

/* Hero Section */
.hero{
    background:#111;
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:10px;
}

/* Content Section */
.content{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.content h2{
    margin-top:0;
}

.content ul{
    padding-left:20px;
}

/* Footer */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

        <h2 class="logo">My Digital Portfolio</h2>

<section class="content">

  </p>

    <h2>My Skills</h2>
    <ul>
        <li>Programming</li>
        <li>Teamwork</li>
        <li>Communication</li>

<footer>
