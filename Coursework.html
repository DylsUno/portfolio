<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coursework</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f7;
}

/* Navigation */
header{
    background:black;
    padding:15px 40px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    margin:0;
}

nav ul{
    display:flex;
    list-style:none;
    gap:15px;
    margin:0;
    padding:0;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    padding:8px 14px;
    border-radius:6px;
    transition:0.3s ease;
}

nav a:hover{
    background:white;
    color:black;
}

/* Hero Section */
.hero{
    background:#111;
    color:white;
    text-align:center;
    padding:60px;
}

/* Unit Cards */
.units{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.unit-card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.unit-card a{
    display:inline-block;
    background:black;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:5px;
}

.unit-card a:hover{
    background:#333;
}

/* Footer */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <nav>
        <h2 class="logo">My Digital Portfolio</h2>

        <ul>
            <li><a href="index.html">Home&nbsp; &nbsp;&nbsp;</a></li>
            <li></li>
            <li><a href="Coursework.html">Coursework</a></li>
            <li></li>
            <li><a href="media.html">&nbsp;</a></li>
            <li><a href="contact.html">&nbsp;</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>Coursework Units</h1>
    <p>Click a unit to view</p>
</section>

<section class="units">

    <div class="unit-card">
        <h3>Unit 3</h3>
        <a href="Unit3.html">View Unit</a>
    </div>

    <div class="unit-card">
        <h3>Unit 19</h3>
        <a href="Unit19.html">View Unit</a>
    </div>

    <div class="unit-card">
        <h3>Unit 1 Dionne</h3>
        <a href="Unit1Dionne.html">View Unit</a>
    </div>

    <div class="unit-card">
        <h3>Unit 2 Dionne</h3>
        <a href="Unit2Dionne.html">View Unit</a>
    </div>

</section>

<footer>
    <p>My Digital Portfolio 2026</p>
</footer>

</body>
</html>
